<section class="max-w-3xl space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900">
      {{ isEditMode ? 'Edit Agent' : 'Create Agent' }}
    </h1>
    <p class="text-sm text-slate-500">
      {{ isEditMode ? 'Update this agent configuration.' : 'Create a new AI agent with role, instructions and model configuration.' }}
    </p>
  </div>

  @if (isLoading()) {
    <div class="rounded-xl bg-white p-6 shadow text-slate-500">
      Loading agent...
    </div>
  } @else {
    @if (errorMessage()) {
      <div class="rounded-xl bg-red-50 p-4 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-5 bg-white p-6 rounded-2xl shadow">
      <div>
        <label for="name" class="block text-sm font-medium text-slate-700 mb-1">
          Name
        </label>
        <input
          id="name"
          type="text"
          name="name"
          [(ngModel)]="agent.name"
          class="w-full rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400"
          placeholder="Business Proposal Agent"
          required
        />
      </div>

      <div>
        <label for="role" class="block text-sm font-medium text-slate-700 mb-1">
          Role
        </label>
        <input
          id="role"
          type="text"
          name="role"
          [(ngModel)]="agent.role"
          class="w-full rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400"
          placeholder="Pre-Sales Consultant"
          required
        />
      </div>

      <div>
        <label for="instructions" class="block text-sm font-medium text-slate-700 mb-1">
          Instructions
        </label>
        <textarea
          id="instructions"
          name="instructions"
          [(ngModel)]="agent.instructions"
          rows="6"
          class="w-full rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400"
          placeholder="Write clear and professional proposals for German SME customers."
          required
        ></textarea>
      </div>

      <div>
        <label for="model" class="block text-sm font-medium text-slate-700 mb-1">
          Model
        </label>

        <select
          id="model"
          name="model"
          [(ngModel)]="agent.model"
          class="w-full rounded-xl border border-slate-300 px-4 py-2 outline-none focus:ring-2 focus:ring-slate-400"
        >
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-4.1">gpt-4.1</option>
        </select>
      </div>

      @if (isEditMode) {
        <label class="flex items-center gap-3 rounded-xl bg-slate-50 p-4">
          <input
            type="checkbox"
            name="isActive"
            [(ngModel)]="agent.isActive"
            class="h-4 w-4"
          />
          <span class="text-sm text-slate-700">
            Agent is active
          </span>
        </label>
      }

      <div class="flex gap-3">
        <button
          type="submit"
          [disabled]="isSaving()"
          class="rounded-xl bg-slate-900 px-5 py-2 text-white hover:bg-slate-700 disabled:opacity-50"
        >
          @if (isSaving()) {
            {{ isEditMode ? 'Saving...' : 'Creating...' }}
          } @else {
            {{ isEditMode ? 'Save Changes' : 'Create Agent' }}
          }
        </button>

        <button
          type="button"
          routerLink="/agents"
          class="rounded-xl border border-slate-300 px-5 py-2 text-slate-700 hover:bg-slate-100"
        >
          Cancel
        </button>
      </div>
    </form>
  }
</section>
